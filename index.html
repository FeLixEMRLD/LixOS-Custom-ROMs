<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sphere-gradient: linear-gradient(135deg, #adadad 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: pan-y;
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* Navigation - Now STATIC (Fixed) when scrolling */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
            position: fixed; /* Stays in place */
            width: 100%;
            top: 0;
            left: 0;
            z-index: 100;
            /* Optional: subtle background to keep links readable over spheres */
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px); 
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 40px;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }

        nav a:hover { opacity: 0.5; }

        /* Main Section */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero-text {
            position: relative;
            z-index: 10;
            transform: translateY(-5vh); /* Lifted from center */
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.2rem;
        }

        .title {
            font-size: 8rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            line-height: 0.9;
        }

        .btn {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            display: inline-block;
            transition: all 0.3s ease;
            border: 2px solid #000;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        /* Spheres - Absolute so they scroll away with content */
        .sphere {
            position: absolute;
            border-radius: 50%;
            background: var(--sphere-gradient);
            z-index: 1;
            pointer-events: none;
        }

        .s1 { width: 250px; height: 250px; top: 12%; left: 10%; }
        .s2 { width: 550px; height: 550px; top: 60%; left: -100px; }
        .s3 { width: 450px; height: 450px; top: 65%; right: -100px; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            header {
                justify-content: center;
                padding: 20px 10px;
            }

            nav a {
                margin: 0 15px;
                font-size: 1rem;
            }

            .hero-text {
                transform: translateY(-8vh);
            }

            .title {
                font-size: 4.8rem;
                margin-bottom: 2rem;
            }

            .subtitle {
                font-size: 1.8rem;
            }

            .s1 { width: 140px; height: 140px; top: 18%; left: 5%; }
            .s2 { width: 280px; height: 280px; top: 75%; left: -50px; }
            .s3 { width: 260px; height: 260px; top: 80%; right: -50px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#download">Download</a>
            <a href="#about">About</a>
        </nav>
    </header>

    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
    <div class="sphere s3"></div>

    <section class="hero-section">
        <div class="hero-text">
            <p class="subtitle">Break Static</p>
            <h1 class="title">LixOS</h1>
            <a href="#download" class="btn">Get for your device</a>
        </div>
    </section>

    <div id="download" style="height: 100vh; padding: 100px 20px; text-align: center; background: white; position: relative; z-index: 20;">
        <h2>Download Section</h2>
        <p style="margin-top: 20px;">Watch the header above—it stays fixed while the content moves.</p>
    </div>

</body>
</html>
