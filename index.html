<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Fira Mono', monospace;
            background-color: #ffffff;
            color: #000;
            overflow-x: hidden;
        }

        /* --- Background Shapes (No cutting) --- */
        .circle {
            position: fixed;
            border-radius: 50%;
            background: linear-gradient(145deg, #7a7a7a, #2b2b2b);
            z-index: 0;
            filter: blur(2px);
        }

        /* Adjusted positions to keep them inside the viewport */
        .c1 { width: 300px; height: 300px; top: 10%; left: 5%; }
        .c2 { width: 200px; height: 200px; bottom: 15%; left: 15%; }
        .c3 { width: 350px; height: 350px; bottom: 5%; right: 5%; }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 40px 60px;
            display: flex;
            gap: 40px;
            z-index: 10;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 1.1rem;
        }

        /* --- Hero Section --- */
        .hero {
            position: relative;
            z-index: 5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 2.2rem;
            font-weight: 400;
            margin: 0;
        }

        .hero h1 {
            font-size: 7rem;
            font-weight: 500;
            margin: 10px 0 40px 0;
        }

        /* --- The Button + Invert Hover --- */
        .btn {
            background: #000;
            color: #fff;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            border: 2px solid #000;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .download-section {
            position: relative;
            z-index: 5;
            background: white;
            padding: 120px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Download</a>
        <a href="#">About</a>
    </nav>

    <div class="hero">
        <h2>Break Static</h2>
        <h1>LixOS</h1>
        <a href="#" class="btn">Get for your device</a>
    </div>

    <div class="download-section">
        <h2>Download Section</h2>
        <p>Watch the header above—it stays fixed while the content moves.</p>
    </div>

</body>
</html>
