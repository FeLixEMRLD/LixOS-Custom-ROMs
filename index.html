<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Global Reset and Font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: #ffffff;
            color: #000000;
            overflow: hidden; /* Prevents scrollbars from moving background elements */
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Navigation Bar */
        header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 1px solid #000;
            position: relative;
            z-index: 10; /* Keeps header above background elements */
            background-color: rgba(255, 255, 255, 0.8); /* Slight transparency */
        }

        nav a {
            text-decoration: none;
            color: #000;
            margin-left: 40px;
            font-size: 1.2rem;
            transition: color 0.2s ease;
        }

        nav a:hover {
            color: #555;
        }

        /* Main Content Area */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10; /* Keeps text above background elements */
        }

        .subtitle {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .title {
            font-size: 8rem;
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: -2px;
        }

        .cta-button {
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 40px; /* Pill shape */
            font-size: 1.2rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .cta-button:hover {
            background-color: #333333;
            transform: scale(1.02);
        }

        /* Gradient Background Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            z-index: 1; /* Places them behind the main content */
        }

        .circle-1 {
            width: 350px;
            height: 350px;
            top: 10%;
            left: 8%;
            /* Gradients modeled after the image's lighting */
            background: radial-gradient(circle at 30% 30%, #e6e6e6, #a1a1a1, #616161);
            animation: float1 8s ease-in-out infinite alternate;
        }

        .circle-2 {
            width: 450px;
            height: 450px;
            bottom: -150px;
            left: -100px;
            background: radial-gradient(circle at 70% 30%, #e6e6e6, #999999, #555555);
            animation: float2 10s ease-in-out infinite alternate;
        }

        .circle-3 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -80px;
            background: radial-gradient(circle at 30% 30%, #e6e6e6, #888888, #444444);
            animation: float3 9s ease-in-out infinite alternate;
        }

        /* Smooth Floating Animations */
        @keyframes float1 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 40px); }
        }

        @keyframes float2 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-20px, -30px); }
        }

        @keyframes float3 {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, 20px); }
        }
        
        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            .title { font-size: 5rem; }
            .subtitle { font-size: 1.5rem; }
            nav a { margin-left: 20px; font-size: 1rem; }
            header { padding: 15px 20px; }
            .circle-1 { width: 200px; height: 200px; }
            .circle-2 { width: 250px; height: 250px; }
            .circle-3 { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="circle circle-3"></div>

    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="#download">Download</a>
            <a href="#about">About</a>
        </nav>
    </header>

    <main>
        <h2 class="subtitle">Break Static</h2>
        <h1 class="title">LixOS</h1>
        <a href="#download" class="cta-button">Get for your device</a>
    </main>

</body>
</html>
