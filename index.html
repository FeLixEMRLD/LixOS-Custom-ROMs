<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS Header Fix</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Fira Mono', monospace;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        .site-header {
            border-bottom: 1.5px solid #000000;
            padding: 15px 50px;
            width: 100%;
            box-sizing: border-box;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- Logo Section --- */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .text-stack {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .sub-text {
            font-size: 14px; /* Scaled down for accuracy */
            margin: 0;
        }

        .main-text {
            font-size: 38px; /* Compact title size */
            font-weight: 500;
            margin: 0;
            letter-spacing: -1px;
        }

        /* Restored 3-Square stepped logo */
        .graphic-box {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .square {
            position: absolute;
            width: 28px;
            height: 28px;
            background-color: rgba(0, 0, 0, 0.12); /* Subtle transparency */
        }

        .sq-1 { top: 0; left: 0; }        /* Top Left */
        .sq-2 { top: 11px; left: 11px; }  /* Middle Offset */
        .sq-3 { top: 22px; left: 22px; }  /* Bottom Right */

        /* --- Navigation --- */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            color: #000000;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <div class="logo-container">
                <div class="text-stack">
                    <span class="sub-text">Break Static</span>
                    <h1 class="main-text">LixOS</h1>
                </div>
                <div class="graphic-box">
                    <div class="square sq-1"></div>
                    <div class="square sq-2"></div>
                    <div class="square sq-3"></div>
                </div>
            </div>

            <nav>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Download</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

</body>
</html>
