<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            /* Flat linear gradient per your PowerPoint reference */
            --sphere-gradient: linear-gradient(135deg, #adadad 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            /* Overflow-y: auto allows vertical scrolling */
            overflow-y: auto; 
            overflow-x: hidden;
            min-height: 200vh; /* Added extra height to demonstrate scrolling */
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
            position: sticky; /* Stays at the top while you scroll */
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid #eee;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 40px;
            font-size: 1.2rem;
        }

        /* Main UI Container */
        .hero-section {
            height: calc(100vh - 85px); /* Full height minus header */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 8rem;
            font-weight: 400;
            margin-bottom: 3rem;
            line-height: 1;
        }

        .btn {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Fixed Spheres - Static Positions */
        .sphere {
            position: absolute;
            border-radius: 50%;
            background: var(--sphere-gradient);
            z-index: 1;
            pointer-events: none; /* Allows clicking "through" them if needed */
        }

        /* Top Left - Matches your layout */
        .s1 {
            width: 340px;
            height: 340px;
            top: 15%;
            left: 8%;
        }

        /* Bottom Left - Large */
        .s2 {
            width: 500px;
            height: 500px;
            bottom: -5%;
            left: -10%;
        }

        /* Bottom Right - Large */
        .s3 {
            width: 480px;
            height: 480px;
            bottom: -5%;
            right: -5%;
        }

        /* Placeholder for scrollable content */
        .content-block {
            padding: 100px 10%;
            font-size: 1.5rem;
            line-height: 1.6;
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#download">Download</a>
            <a href="#about">About</a>
        </nav>
    </header>

    <section class="hero-section">
        <div class="sphere s1"></div>
        <div class="sphere s2"></div>
        <div class="sphere s3"></div>

        <div class="hero-text">
            <p class="subtitle">Break Static</p>
            <h1 class="title">LixOS</h1>
            <a href="#" class="btn">Get for your device</a>
        </div>
    </section>

    <section id="about" class="content-block">
        <h2>About LixOS</h2>
        <p>This page is now scrollable. You can add more sections, information, or downloads here. The background spheres remain in their original design positions within the hero section.</p>
    </section>

</body>
</html>
