<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sphere-gradient: linear-gradient(135deg, #adadad 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Extra safety to prevent accidental horizontal shifts */
            touch-action: pan-y; 
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 40px;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }

        nav a:hover { opacity: 0.5; }

        /* Centered Hero Section */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Vertical Center */
            align-items: center;     /* Horizontal Center */
            text-align: center;
            position: relative;
        }

        .hero-text {
            position: relative;
            z-index: 10;
            /* Slight upward shift to visually balance the "logo" area */
            transform: translateY(-5vh); 
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.2rem;
        }

        .title {
            font-size: 8rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            line-height: 0.9;
        }

        .btn {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            display: inline-block;
            transition: all 0.3s ease;
            border: 2px solid #000;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        /* Static Background Spheres */
        .sphere {
            position: absolute;
            border-radius: 50%;
            background: var(--sphere-gradient);
            z-index: 1;
            pointer-events: none;
        }

        /* Positions based on your layout */
        .s1 { width: 250px; height: 250px; top: 12%; left: 10%; }
        .s2 { width: 550px; height: 550px; bottom: -5%; left: -10%; }
        .s3 { width: 450px; height: 450px; bottom: 5%; right: -5%; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            header {
                justify-content: center;
                padding: 40px 10px;
            }

            nav a {
                margin: 0 15px;
                font-size: 1rem;
            }

            .hero-text {
                transform: translateY(-8vh); /* Lifts content higher on mobile */
            }

            .title {
                font-size: 4.8rem;
                margin-bottom: 2rem;
            }

            .subtitle {
                font-size: 1.8rem;
            }

            /* Scaled spheres for mobile */
            .s1 { width: 140px; height: 140px; top: 18%; left: 5%; }
            .s2 { width: 300px; height: 300px; bottom: 15%; left: -10%; }
            .s3 { width: 280px; height: 280px; bottom: 5%; right: -10%; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Download</a>
            <a href="#">About</a>
        </nav>
    </header>

    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
    <div class="sphere s3"></div>

    <section class="hero-section">
        <div class="hero-text">
            <p class="subtitle">Break Static</p>
            <h1 class="title">LixOS</h1>
            <a href="#" class="btn">Get for your device</a>
        </div>
    </section>

    <div style="height: 100vh; background: #fff; position: relative; z-index: 20; padding: 100px 20px; text-align: center;">
        <h2>Download Section</h2>
        <p style="margin-top: 20px;">Scrolling is enabled. Content below the hero will appear here.</p>
    </div>

</body>
</html>
