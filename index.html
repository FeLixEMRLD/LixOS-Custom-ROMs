<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            /* Linear gradient from your reference image */
            --sphere-gradient: linear-gradient(135deg, #adadad 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 200vh; /* Keeps the page scrollable */
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
            position: fixed; /* Header stays at the top of the screen */
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 40px;
            font-size: 1.2rem;
        }

        /* Main UI Container */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero-text {
            position: relative;
            z-index: 10;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 8rem;
            font-weight: 400;
            margin-bottom: 3rem;
            line-height: 1;
        }

        .btn {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #333;
        }

        /* Fixed Hovering Spheres */
        .sphere {
            position: fixed; /* Stays in the viewport while scrolling */
            border-radius: 50%;
            background: var(--sphere-gradient);
            z-index: 1;
            pointer-events: none;
        }

        /* Top Left - Small */
        .s1 {
            width: 180px;
            height: 180px;
            top: 15%;
            left: 10%;
            animation: hover-slow 8s ease-in-out infinite alternate;
        }

        /* Bottom Left - Large */
        .s2 {
            width: 550px;
            height: 550px;
            bottom: -100px;
            left: -100px;
            animation: hover-slow 12s ease-in-out infinite alternate-reverse;
        }

        /* Bottom Right - Medium */
        .s3 {
            width: 380px;
            height: 380px;
            bottom: -50px;
            right: -50px;
            animation: hover-slow 10s ease-in-out infinite alternate;
        }

        /* Hovering Animation */
        @keyframes hover-slow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 40px); }
        }

        .content-block {
            padding: 100px 10%;
            position: relative;
            z-index: 10;
            background: white; /* Optional: hides balls as you scroll into content */
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#download">Download</a>
            <a href="#about">About</a>
        </nav>
    </header>

    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
    <div class="sphere s3"></div>

    <section class="hero-section">
        <div class="hero-text">
            <p class="subtitle">Break Static</p>
            <h1 class="title">LixOS</h1>
            <a href="#" class="btn">Get for your device</a>
        </div>
    </section>

    <section id="about" class="content-block">
        <h2>Scroll to explore</h2>
        <p>The background spheres now stay fixed in their sectors with a subtle hovering effect. The sizes are now Small (Top-Left), Large (Bottom-Left), and Medium (Bottom-Right) to match your requirements.</p>
    </section>

</body>
</html>
