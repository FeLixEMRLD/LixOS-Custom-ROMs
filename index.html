<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Fira Mono', monospace;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
        }

        /* The main container with the bottom divider */
        .site-header {
            border-bottom: 2px solid #000000;
            padding: 10px 50px; /* Adjust side padding as needed */
            width: 100%;
            box-sizing: border-box;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end; /* Keeps text aligned to the bottom line */
        }

        /* --- Title Group --- */
        .title-group {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .sub-title {
            font-size: 16px;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .main-title {
            font-size: 42px;
            font-weight: 500;
            margin: 0;
            margin-top: -2px; /* Pulls the title closer to the sub-title */
        }

        /* --- Navigation --- */
        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
            margin: 0;
            padding: 0;
            padding-bottom: 8px; /* Aligns menu horizontally with the main title */
        }

        .nav-links li a {
            text-decoration: none;
            color: #000000;
            font-size: 22px;
            transition: opacity 0.2s;
        }

        .nav-links li a:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <div class="title-group">
                <h1 class="main-title">LixOS</h1>
            </div>

            <nav>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Download</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

</body>
</html>
