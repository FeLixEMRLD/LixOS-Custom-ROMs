<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sphere-gradient: linear-gradient(135deg, #adadad 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 200vh;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 40px;
            font-size: 1.2rem;
            transition: all 0.3s ease; /* Hover transition */
            border-bottom: 2px solid transparent;
        }

        /* Link Hover Effect */
        nav a:hover {
            color: #666;
            border-bottom: 2px solid #666;
        }

        /* Main UI Container */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .hero-text {
            position: relative;
            z-index: 10;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 8rem;
            font-weight: 400;
            margin-bottom: 3rem;
            line-height: 1;
        }

        /* Button Hover Effect */
        .btn {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-block;
            border: 2px solid #000;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Static Spheres - No Animation */
        .sphere {
            position: fixed;
            border-radius: 50%;
            background: var(--sphere-gradient);
            z-index: 1;
            pointer-events: none;
        }

        /* Top Left - Small */
        .s1 {
            width: 180px;
            height: 180px;
            top: 15%;
            left: 10%;
        }

        /* Bottom Left - Large */
        .s2 {
            width: 550px;
            height: 550px;
            bottom: -100px;
            left: -100px;
        }

        /* Bottom Right - Medium */
        .s3 {
            width: 380px;
            height: 380px;
            bottom: -50px;
            right: -50px;
        }

        .content-block {
            padding: 100px 10%;
            position: relative;
            z-index: 10;
            background: white;
            min-height: 100vh;
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#download">Download</a>
            <a href="#about">About</a>
        </nav>
    </header>

    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
    <div class="sphere s3"></div>

    <section class="hero-section">
        <div class="hero-text">
            <p class="subtitle">Break Static</p>
            <h1 class="title">LixOS</h1>
            <a href="#" class="btn">Get for your device</a>
        </div>
    </section>

    <section id="about" class="content-block">
        <h2>Scrollable Page Content</h2>
        <p>The spheres are now completely static. The hover effects are applied to the "Home, Download, About" links and the "Get for your device" button.</p>
    </section>

</body>
</html>
