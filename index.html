<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS Header</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Fira Mono', monospace;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        .site-header {
            border-bottom: 2px solid #000000; /* Matching the thick line in the screenshot */
            padding: 10px 40px;
            width: 100%;
            box-sizing: border-box;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- Updated Logo Section --- */
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .text-stack {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .sub-text {
            font-size: 22px; /* Large "Break Static" as seen in PPT */
            margin: 0;
        }

        .main-text {
            font-size: 64px; /* Large "LixOS" title */
            font-weight: 500;
            margin: 0;
            letter-spacing: -2px;
        }

        /* The overlapping squares graphic */
        .graphic-box {
            position: relative;
            width: 80px;
            height: 80px;
        }

        /* Shared style for both squares */
        .square {
            position: absolute;
            width: 55px;
            height: 55px;
            background-color: rgba(0, 0, 0, 0.15); /* Semi-transparent grey */
        }

        /* Top-right square */
        .sq-1 {
            top: 0;
            right: 0;
        }

        /* Bottom-left square */
        .sq-2 {
            bottom: 0;
            left: 0;
        }

        /* --- Navigation --- */
        
        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            color: #000000;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <div class="logo-container">
                <div class="text-stack">
                    <span class="sub-text">Break Static</span>
                    <h1 class="main-text">LixOS</h1>
                </div>
                <div class="graphic-box">
                    <div class="square sq-1"></div>
                    <div class="square sq-2"></div>
                </div>
            </div>

            <nav>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Download</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

</body>
</html>
