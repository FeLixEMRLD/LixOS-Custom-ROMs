<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LixOS | Break Static</title>
<style>
  /* --- Base Styles --- */
  body, html {
    margin: 0;
    padding: 0;
    font-family: "Courier New", Courier, monospace; /* Closest standard font to your screenshot */
    color: #000;
    background-color: #fff;
    overflow-x: hidden; /* Prevents horizontal scrolling */
  }

  /* --- Background Shapes --- */
  .bg-shapes-container {
    position: fixed; /* Keeps shapes in place while scrolling */
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1; /* Keeps them behind the text */
    pointer-events: none; /* Allows you to click through them */
  }

  .shape {
    position: absolute;
    border-radius: 50%;
    background: linear-gradient(135deg, #888888, #222222);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); /* The blur/shadow effect */
  }

  /* Positioned to stay fully within the screen */
  .shape-1 {
    width: 300px;
    height: 300px;
    top: 15%;
    left: 8%; 
  }

  .shape-2 {
    width: 180px;
    height: 180px;
    bottom: 12%;
    left: 22%;
  }

  .shape-3 {
    width: 320px;
    height: 320px;
    bottom: 10%;
    right: 8%;
  }

  /* --- Navigation --- */
  nav {
    display: flex;
    justify-content: flex-end;
    padding: 2rem 4rem;
    position: fixed;
    width: 100%;
    box-sizing: border-box;
    top: 0;
    z-index: 10;
    background: rgba(255, 255, 255, 0.9); /* Slight white background to make text readable when scrolling */
    backdrop-filter: blur(5px);
  }

  nav a {
    text-decoration: none;
    color: #000;
    margin-left: 3rem;
    font-size: 1.1rem;
  }

  /* --- Hero Section --- */
  .hero {
    height: 100vh; /* Takes up the full height of the screen */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .hero h2 {
    font-size: 2rem;
    font-weight: normal;
    margin: 0;
    letter-spacing: 2px;
  }

  .hero h1 {
    font-size: 6rem;
    margin: 0.5rem 0 2rem;
    letter-spacing: 5px;
  }

  .download-btn {
    background-color: #000;
    color: #fff;
    padding: 1rem 2.5rem;
    border-radius: 30px;
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: bold;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
  }

  /* --- Secondary Content Section --- */
  .content-section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: #fff; /* Solid background so it covers the shapes when you scroll down */
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .content-section h3 {
    font-size: 2rem;
    margin-bottom: 1rem;
  }
</style>
</head>
<body>

  <div class="bg-shapes-container">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Download</a>
    <a href="#">About</a>
  </nav>

  <div class="hero">
    <h2>Break Static</h2>
    <h1>LixOS</h1>
    <a href="#" class="download-btn">Get for your device</a>
  </div>

  <div class="content-section">
    <h3>Download Section</h3>
    <p>Watch the header above—it stays fixed while the content moves.</p>
  </div>

</body>
</html>
