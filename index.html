<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sphere-gradient: linear-gradient(135deg, #adadad 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 40px;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.5;
        }

        /* Hero Section */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        .hero-text {
            position: relative;
            z-index: 10;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 8rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            line-height: 0.9;
        }

        /* Button & Hover */
        .btn {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            display: inline-block;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #333;
        }

        /* Spheres (Desktop sizes) */
        .sphere {
            position: fixed;
            border-radius: 50%;
            background: var(--sphere-gradient);
            z-index: 1;
            pointer-events: none;
        }

        .s1 { width: 220px; height: 220px; top: 15%; left: 10%; }
        .s2 { width: 550px; height: 550px; bottom: -100px; left: -100px; }
        .s3 { width: 400px; height: 400px; bottom: -50px; right: -50px; }

        /* --- MOBILE COMPATIBILITY --- */
        @media (max-width: 768px) {
            header {
                padding: 20px;
                justify-content: center;
            }

            nav a {
                margin: 0 15px;
                font-size: 1rem;
            }

            .title {
                font-size: 4.5rem; /* Shrunk for mobile screens */
            }

            .subtitle {
                font-size: 1.5rem;
            }

            .btn {
                padding: 15px 30px;
                font-size: 1rem;
            }

            /* Adjust spheres so they don't drown out the UI on mobile */
            .s1 {
                width: 120px;
                height: 120px;
                top: 20%;
                left: 5%;
            }

            .s2 {
                width: 250px;
                height: 250px;
                bottom: -50px;
                left: -50px;
            }

            .s3 {
                width: 200px;
                height: 200px;
                bottom: 10%;
                right: -40px;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Download</a>
            <a href="#">About</a>
        </nav>
    </header>

    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
    <div class="sphere s3"></div>

    <section class="hero-section">
        <div class="hero-text">
            <p class="subtitle">Break Static</p>
            <h1 class="title">LixOS</h1>
            <a href="#" class="btn">Get for your device</a>
        </div>
    </section>

</body>
</html>
