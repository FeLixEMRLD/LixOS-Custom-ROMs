<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sphere-gradient: linear-gradient(135deg, #adadad 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
            position: relative;
            z-index: 10;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 40px;
            font-size: 1.2rem;
        }

        /* Main UI */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 8rem;
            font-weight: 400;
            margin-bottom: 3rem;
        }

        .btn {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        /* Spheres - Flat Gradients */
        .sphere {
            position: absolute;
            border-radius: 50%;
            background: var(--sphere-gradient);
            z-index: 1;
        }

        /* Top Left - Medium */
        .s1 {
            width: 320px;
            height: 320px;
            top: 10%;
            left: 5%;
            animation: drift-tl 12s ease-in-out infinite alternate;
        }

        /* Bottom Left - Large */
        .s2 {
            width: 480px;
            height: 480px;
            bottom: -10%;
            left: -5%;
            animation: drift-bl 15s ease-in-out infinite alternate;
        }

        /* Bottom Right - Small/Medium */
        .s3 {
            width: 280px;
            height: 280px;
            bottom: 5%;
            right: 5%;
            animation: drift-br 10s ease-in-out infinite alternate;
        }

        /* Movement without overlapping center text */
        @keyframes drift-tl {
            from { transform: translate(0, 0); }
            to { transform: translate(20px, 30px); }
        }
        @keyframes drift-bl {
            from { transform: translate(0, 0); }
            to { transform: translate(15px, -20px); }
        }
        @keyframes drift-br {
            from { transform: translate(0, 0); }
            to { transform: translate(-30px, -10px); }
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Download</a>
            <a href="#">About</a>
        </nav>
    </header>

    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
    <div class="sphere s3"></div>

    <main>
        <p class="subtitle">Break Static</p>
        <h1 class="title">LixOS</h1>
        <a href="#" class="btn">Get for your device</a>
    </main>

</body>
</html>
