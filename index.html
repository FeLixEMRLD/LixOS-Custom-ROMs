<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Fira Mono', monospace;
            background-color: #ffffff;
            color: #000;
            overflow-x: hidden;
        }

        /* --- Crisp Background Circles (No Blur) --- */
        .circle {
            position: fixed;
            border-radius: 50%;
            background: linear-gradient(145deg, #555555, #222222);
            z-index: 0;
            /* Filter removed so shapes stay sharp */
        }

        /* Adjusted positions to keep them fully on screen */
        .c1 { width: 320px; height: 320px; top: 15%; left: 5%; }
        .c2 { width: 180px; height: 180px; bottom: 20%; left: 18%; }
        .c3 { width: 380px; height: 380px; bottom: 10%; right: 5%; }

        /* --- Header with Top Blur Effect --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 60px;
            display: flex;
            justify-content: flex-end;
            box-sizing: border-box;
            z-index: 100;
            /* This creates the blur effect on top of the site */
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 1.1rem;
            margin-left: 40px;
        }

        /* --- Hero Section --- */
        .hero {
            position: relative;
            z-index: 5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 2.2rem;
            font-weight: 400;
            margin: 0;
        }

        .hero h1 {
            font-size: 8rem;
            font-weight: 500;
            margin: 10px 0 40px 0;
        }

        /* --- Button with Hover Invert --- */
        .btn {
            background: #000;
            color: #fff;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            border: 2px solid #000;
            transition: all 0.2s ease-in-out;
        }

        .btn:hover {
            background: transparent;
            color: #000;
        }

        /* --- Content Section --- */
        .download-section {
            position: relative;
            z-index: 5;
            background: white;
            padding: 150px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Download</a>
        <a href="#">About</a>
    </nav>

    <div class="hero">
        <h2>Break Static</h2>
        <h1>LixOS</h1>
        <a href="#" class="btn">Get for your device</a>
    </div>

    <div class="download-section">
        <h2 id="download">Download Section</h2>
        <p>Notice how the navigation bar blurs the shapes as they pass underneath.</p>
        <div style="height: 1000px;"></div> </div>

</body>
</html>
