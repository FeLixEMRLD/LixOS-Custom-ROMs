<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LixOS | Break Static</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --sphere-gradient: linear-gradient(135deg, #adadad 0%, #000000 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            /* Scroll enabled */
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 200vh;
        }

        /* Navigation - Centered on Mobile, Right on Desktop */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 30px 60px;
            position: absolute; /* Changed from fixed to allow it to move with initial scroll */
            width: 100%;
            top: 0;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 40px;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
        }

        nav a:hover { opacity: 0.5; }

        /* Hero Section - Centering Logic */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Vertical center */
            align-items: center;     /* Horizontal center */
            text-align: center;
            position: relative;
            padding-bottom: 5vh;    /* Slightly lifts the content up */
        }

        .hero-text {
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 0.2rem;
        }

        .title {
            font-size: 8rem;
            font-weight: 400;
            margin-bottom: 2rem;
            line-height: 0.9;
        }

        .btn {
            background: #000;
            color: #fff;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2rem;
            display: inline-block;
            transition: all 0.3s ease;
            border: 2px solid #000;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }

        /* Spheres */
        .sphere {
            position: absolute; /* Follows scroll */
            border-radius: 50%;
            background: var(--sphere-gradient);
            z-index: 1;
            pointer-events: none;
        }

        /* Desktop Positions */
        .s1 { width: 250px; height: 250px; top: 10%; left: 10%; }
        .s2 { width: 550px; height: 550px; top: 60%; left: -150px; }
        .s3 { width: 450px; height: 450px; top: 65%; right: -100px; }

        /* --- MOBILE FIXES --- */
        @media (max-width: 768px) {
            header {
                justify-content: center;
                padding: 40px 10px;
            }

            nav a {
                margin: 0 15px;
                font-size: 1rem;
            }

            .hero-section {
                padding-bottom: 15vh; /* Lifts logo/button higher on small screens */
            }

            .title {
                font-size: 4.8rem;
                margin-bottom: 1.5rem;
            }

            .subtitle {
                font-size: 1.6rem;
            }

            /* Adjust spheres for mobile layout */
            .s1 { width: 150px; height: 150px; top: 15%; left: 5%; }
            .s2 { width: 300px; height: 300px; top: 75%; left: -80px; }
            .s3 { width: 280px; height: 280px; top: 80%; right: -80px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Download</a>
            <a href="#">About</a>
        </nav>
    </header>

    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
    <div class="sphere s3"></div>

    <section class="hero-section">
        <div class="hero-text">
            <p class="subtitle">Break Static</p>
            <h1 class="title">LixOS</h1>
            <a href="#" class="btn">Get for your device</a>
        </div>
    </section>

    <div style="height: 100vh; padding: 50px; text-align: center;">
        <h2 id="download">Scroll Down Content</h2>
        <p style="margin-top: 20px;">Scrolling is now active. You can place your download links or about info here.</p>
    </div>

</body>
</html>
